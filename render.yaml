services:
  - type: web
    name: PulseLink-backend
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput --clear && python manage.py migrate
    startCommand: daphne -b 0.0.0.0 -p $PORT backend.asgi:application
    healthCheckPath: /api/health/
    envVars:
      - key: DEBUG
        value: False
      - key: USE_REDIS
        value: True

